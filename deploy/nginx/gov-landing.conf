# gov.businessintuitive.tech — Federal Capability Statement (hardened)
# Goals:
#  - Strict TLS + HSTS (preload-ready)
#  - Strict Content-Security-Policy (JS is externalized so script-src can be 'self')
#  - Full security header set, clickjacking + sniffing + framing locked down
#  - PHP/FastCGI only for /api/*.php; everything sensitive denied
#  - Behind Cloudflare: restore real client IP from CF headers
#
# NOTE: All add_header live at server scope. Inner `location` blocks must NOT call
#       add_header (any add_header in a location replaces the inherited set), so they
#       only use expires/try_files/fastcgi — this keeps the security headers on every response.

# ---- Restore real visitor IP when proxied through Cloudflare ----
# (Cloudflare IPv4/IPv6 ranges; refresh from https://www.cloudflare.com/ips/ if they change)
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;

server {
    listen 80;
    listen [::]:80;
    server_name gov.businessintuitive.tech;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name gov.businessintuitive.tech;
    root /var/www/geometric/dist;
    index gov.html;

    ssl_certificate     /etc/letsencrypt/live/gov.businessintuitive.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gov.businessintuitive.tech/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_session_timeout 1d;
    ssl_session_cache shared:GovSSL:10m;
    ssl_session_tickets off;

    server_tokens off;

    # ---- Security headers (inherited by all inner locations) ----
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; img-src 'self' data: https://businessintuitive.tech; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://intelligence.businessintuitive.tech; manifest-src 'self'; upgrade-insecure-requests" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "accelerometer=(), autoplay=(), camera=(), display-capture=(), encrypted-media=(), fullscreen=(self), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), midi=(), payment=(), usb=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml application/xml;
    gzip_min_length 1000;

    # ---- Block sensitive paths / files ----
    location /logs/ { deny all; return 403; }
    location /data/ { deny all; return 403; }
    location /cases/ { deny all; return 403; }
    location ~ /\.  { deny all; return 403; }
    location ~* \.(json|sh|lock|db|sqlite|sqlite3|ini|log|bak|sql|env|yml|yaml|md)$ { deny all; return 403; }

    # ---- PHP API: only the gov endpoint(s) under /api/ ----
    location ~ ^/api/.*\.php$ {
        root /var/www/geometric;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTP_PROXY "";
        include fastcgi_params;
    }

    # ---- Static assets (long cache, headers still inherited) ----
    location /assets/ {
        expires 7d;
        access_log off;
    }
    location ~* \.(svg|ico|png|jpg|jpeg|gif|webp|otf|ttf|woff|woff2)$ {
        expires 30d;
        access_log off;
    }
    # gov.js: short cache so updates ship fast
    location = /assets/gov.js {
        expires 1h;
    }

    # ---- HTML: always fresh (expires epoch preserves security headers) ----
    location ~* \.html$ {
        expires epoch;
    }

    # ---- Clean routes ----
    location = / {
        try_files /gov.html =404;
        expires epoch;
    }

    location = /robots.txt {
        try_files /gov-robots.txt /robots.txt =404;
        default_type text/plain;
        access_log off;
    }

    location = /sitemap.xml {
        try_files /gov-sitemap.xml /sitemap.xml =404;
        default_type application/xml;
        access_log off;
    }

    # ---- Fallback: serve a real file if it exists, else the capability statement ----
    location / {
        try_files $uri $uri/ /gov.html;
    }
}
