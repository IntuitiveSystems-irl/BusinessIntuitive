# intelligence.businessintuitive.tech
# Fixes:
#  - real files are served (sample-report.html etc.) instead of always returning intelligence.html
#  - /sample-report clean URL -> sample-report.html (matches links in emails + on-page button)
#  - PHP/FastCGI restored so /api/*.php (lead form + tracker) actually execute
#  - hardening: server_tokens off, deny /logs /data dotfiles and sensitive extensions
#  - security headers kept on every response (use `expires` for cache so add_header is not reset)

server {
    listen 80;
    server_name intelligence.businessintuitive.tech;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name intelligence.businessintuitive.tech;
    root /var/www/geometric/dist;
    index intelligence.html;

    ssl_certificate     /etc/letsencrypt/live/intelligence.businessintuitive.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/intelligence.businessintuitive.tech/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    server_tokens off;

    # Security headers (inherited by all locations below because none of them use add_header)
    add_header X-Content-Type-Options   "nosniff" always;
    add_header X-Frame-Options          "SAMEORIGIN" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-XSS-Protection         "1; mode=block" always;
    add_header Permissions-Policy       "geolocation=(), microphone=(), camera=()" always;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1000;

    # --- Block sensitive paths / files ---
    location /logs/ { deny all; return 403; }
    location /data/ { deny all; return 403; }
    location ~ /\.  { deny all; return 403; }
    location ~* \.(json|sh|lock|db|sqlite|sqlite3|ini|log|bak|sql)$ { deny all; return 403; }

    # --- PHP API (lead form + visitor tracker) ---
    location ~ ^/api/.*\.php$ {
        root /var/www/geometric;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # --- Static assets (long cache) ---
    location /assets/ {
        expires 1y;
        access_log off;
    }
    location ~* \.(svg|mp4|ico|png|jpg|jpeg|gif|webp|otf|ttf|woff|woff2)$ {
        expires 1y;
        access_log off;
    }

    # --- HTML files: always fresh (expires epoch keeps security headers intact) ---
    location ~* \.html$ {
        expires epoch;
    }

    # --- Clean routes ---
    location = / {
        try_files /intelligence.html =404;
        expires epoch;
    }

    location = /sample-report {
        try_files /sample-report.html =404;
        expires epoch;
    }

    location = /lewis-county-wa-report {
        try_files /lewis-county-wa-report.html =404;
        expires epoch;
    }

    location = /robots.txt {
        try_files /intelligence-robots.txt /robots.txt =404;
        default_type text/plain;
        access_log off;
    }

    location = /sitemap.xml {
        try_files /intelligence-sitemap.xml /sitemap.xml =404;
        default_type application/xml;
        access_log off;
    }

    # --- Fallback: serve a real file if it exists, otherwise show the landing page ---
    location / {
        try_files $uri $uri/ /intelligence.html;
    }
}
