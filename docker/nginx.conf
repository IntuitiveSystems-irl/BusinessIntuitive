server {
    listen 8080;
    server_name _;
    root /var/www/html;
    index index.php;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Gzip
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1000;

    # Serve built Vite assets directly with long cache
    location /assets/ {
        alias /var/www/html/dist/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Serve public files (favicon, icons) from dist
    location = /favicon.svg {
        alias /var/www/html/dist/favicon.svg;
        expires 1y;
        access_log off;
    }

    location = /icons.svg {
        alias /var/www/html/dist/icons.svg;
        expires 1y;
        access_log off;
    }

    # SEO files — served directly from Vite dist
    location = /robots.txt {
        alias /var/www/html/dist/robots.txt;
        default_type text/plain;
        access_log off;
    }

    location = /sitemap.xml {
        alias /var/www/html/dist/sitemap.xml;
        default_type application/xml;
        access_log off;
    }

    location = /about {
        alias /var/www/html/dist/about.html;
        default_type text/html;
    }

    # Admin panel — businessintuitive.tech/admin
    location ~ ^/admin/?$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/html/api/newsletter-admin.php;
        fastcgi_param REQUEST_URI $request_uri;
        include fastcgi_params;
    }

    # API endpoints — PHP
    location /api/ {
        try_files $uri =404;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Block access to logs, data, and sensitive files
    location /logs/ {
        deny all;
        return 403;
    }

    location /data/ {
        deny all;
        return 403;
    }

    location ~ \.(json|sh|md|lock)$ {
        deny all;
        return 403;
    }

    # Everything else goes through index.php (visitor tracking + serve HTML)
    location / {
        try_files $uri $uri/ /index.php;
    }

    location = /index.php {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Block hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
